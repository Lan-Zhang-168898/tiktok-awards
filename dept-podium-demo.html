<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dept Podium Demo</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .dept-detail-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 16px; }
    .podium-section { margin-bottom: 32px; }
    .section-title-main { font-size: 20px; font-weight: 600; margin-bottom: 12px; text-align: left; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🏆</span>
          <div class="logo-content">
            <span class="logo-text">Global E-commerce Recognition Hub</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <h2 class="dept-detail-title">Product</h2>

        <section class="podium-section">
          <div class="section-title-main">🏆 Top 3</div>
          <div id="dept-top3-podium"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="js/main.js?v=20250512l"></script>
  <script>
    // Wait for main.js to load, then render podium with fake data
    window.addEventListener('load', () => {
      const top3 = [
        { name: 'Sarah Johnson', department: 'Product', score: 1500 },
        { name: 'Michael Chen', department: 'Product', score: 1200 },
        { name: 'Emily Rodriguez', department: 'Product', score: 800 }
      ];
      if (typeof renderPodium === 'function') {
        renderPodium(top3, 'dept-top3-podium');
        console.log('renderPodium called');
      } else {
        document.getElementById('dept-top3-podium').innerHTML = '<div style="color:red">renderPodium not found!</div>';
        console.log('renderPodium NOT found');
      }
    });
  </script>
</body>
</html>
